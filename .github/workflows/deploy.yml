name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      R2_PUBLIC_BASE: ${{ vars.R2_PUBLIC_BASE }}
      API_BASE: ${{ vars.API_BASE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Resolve release variables
        run: |
          echo "RELEASE_ID=${GITHUB_SHA::12}" >> "$GITHUB_ENV"
          echo "R2_PUBLIC_BASE=${R2_PUBLIC_BASE}" >> "$GITHUB_ENV"
          echo "API_BASE=${API_BASE}" >> "$GITHUB_ENV"
          if [ -n "${R2_PUBLIC_BASE:-}" ]; then
            echo "DATA_BASE=${R2_PUBLIC_BASE%/}/releases/${GITHUB_SHA::12}" >> "$GITHUB_ENV"
          fi

      - name: Show release variables
        run: |
          echo "RELEASE_ID=${RELEASE_ID}"
          echo "DATA_BASE=${DATA_BASE}"

      - run: npm ci

      - run: npm run build:release
        env:
          RELEASE_ID: ${{ env.RELEASE_ID }}
          DATA_BASE: ${{ env.DATA_BASE }}
          API_BASE: ${{ env.API_BASE }}

      - run: npm run upload:r2
        env:
          RELEASE_ID: ${{ env.RELEASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/ --project-name=jiuyao
