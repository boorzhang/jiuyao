<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>漫画阅读器</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --text: #fff;
      --accent: #e94560;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000;
      color: var(--text);
      overflow-x: hidden;
    }
    
    .reader-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: linear-gradient(180deg, rgba(0,0,0,0.8), transparent);
      padding: 12px 16px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .reader-header .back {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      font-size: 16px;
    }
    .reader-header .title {
      font-size: 14px;
      opacity: 0.8;
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .reader-header .page-num {
      font-size: 14px;
      background: rgba(255,255,255,0.2);
      padding: 4px 12px;
      border-radius: 12px;
    }
    
    .reader-content {
      padding-top: 80px;
      padding-bottom: 60px;
    }
    .reader-content img {
      display: block;
      width: 100%;
      height: auto;
    }
    
    .reader-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(0deg, rgba(0,0,0,0.8), transparent);
      padding: 40px 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .reader-footer button {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      padding: 10px 24px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
    }
    .reader-footer button:disabled {
      opacity: 0.3;
    }
    .reader-footer .page-input {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      padding: 10px 16px;
      border-radius: 20px;
      font-size: 14px;
      width: 80px;
      text-align: center;
    }
    .reader-footer .page-input::placeholder {
      color: rgba(255,255,255,0.5);
    }
    
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="reader-header">
    <div class="back" onclick="history.back()">← 返回</div>
    <div class="title" id="title"></div>
    <div class="page-num"><span id="currentPage">1</span>/<span id="totalPage">1</span></div>
  </div>
  
  <div class="reader-content" id="content">
    <div class="loading">加载中...</div>
  </div>
  
  <div class="reader-footer">
    <button id="prevBtn" onclick="prevPage()">上一页</button>
    <input type="number" class="page-input" id="pageInput" placeholder="跳转" onkeydown="if(event.key==='Enter')goToPage()">
    <button id="nextBtn" onclick="nextPage()">下一页</button>
  </div>

  <script>
    // 漫画数据（从JSON加载）
    let comicData = null;
    let currentPage = 0;
    
    // 从URL参数获取漫画ID
    const params = new URLSearchParams(window.location.search);
    const comicId = params.get('id');
    
    async function loadComicData() {
      const response = await fetch('/comics_json/_by_id/COMIC' + comicId + '.json');
      if (!response.ok) {
        document.getElementById('content').innerHTML = '<div class="loading">漫画不存在</div>';
        return;
      }
      comicData = await response.json();
      
      document.getElementById('title').textContent = comicData.title;
      document.getElementById('totalPage').textContent = comicData.chapterCount;
      
      renderPage();
    }
    
    function renderPage() {
      const content = document.getElementById('content');
      // 使用解密后的图片路径
      const imgNum = String(currentPage + 1).padStart(3, '0');
      const imgUrl = '/comics_decrypted/' + comicData.id + '/' + imgNum + '.jpg';
      
      content.innerHTML = '<img src="' + imgUrl + '" onerror="this.src=\'' + comicData.chapters[currentPage].url + '\'">';
      
      document.getElementById('currentPage').textContent = currentPage + 1;
      document.getElementById('prevBtn').disabled = currentPage === 0;
      document.getElementById('nextBtn').disabled = currentPage >= comicData.chapterCount - 1;
      document.getElementById('pageInput').value = '';
    }
    
    function prevPage() {
      if (currentPage > 0) {
        currentPage--;
        renderPage();
      }
    }
    
    function nextPage() {
      if (currentPage < comicData.chapterCount - 1) {
        currentPage++;
        renderPage();
      }
    }
    
    function goToPage() {
      const input = document.getElementById('pageInput');
      const page = parseInt(input.value) - 1;
      if (page >= 0 && page < comicData.chapterCount) {
        currentPage = page;
        renderPage();
      }
    }
    
    // 触摸滑动翻页
    let touchStartX = 0;
    document.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
    });
    document.addEventListener('touchend', e => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) {
        if (diff > 0) nextPage();
        else prevPage();
      }
    });
    
    // 键盘翻页
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevPage();
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') nextPage();
    });
    
    if (comicId) {
      loadComicData();
    } else {
      document.getElementById('content').innerHTML = '<div class="loading">请指定漫画ID</div>';
    }
  </script>
</body>
</html>
