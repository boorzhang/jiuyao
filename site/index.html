<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>91Porn</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --bg-card: #16213e;
      --bg-tab: #0f0f1a;
      --text: #fff;
      --text-secondary: rgba(255,255,255,0.55);
      --text-active: rgba(255,255,255,0.9);
      --accent: #e94560;
      --accent-gold: #ffd700;
      --tab-height: 50px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      padding-bottom: calc(var(--tab-height) + var(--safe-bottom));
    }
    img { display:block; }
    a { color:inherit; text-decoration:none; }

    /* Bottom Tab Bar */
    .tab-bar {
      position: fixed; bottom:0; left:0; right:0;
      height: calc(var(--tab-height) + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: var(--bg-tab);
      display: flex; align-items: center; justify-content: space-around;
      border-top: 1px solid rgba(255,255,255,0.08);
      z-index: 100;
    }
    .tab-item {
      flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
      padding: 6px 0; cursor:pointer; transition: color .2s;
      color: var(--text-secondary); font-size: 10px;
    }
    .tab-item.active { color: var(--accent); }
    .tab-item svg { width:22px; height:22px; }

    /* Pages */
    .page { display:none; min-height:100vh; }
    .page.active { display:block; }

    /* ===== HOME PAGE ===== */
    .home-header {
      position:sticky; top:0; z-index:50;
      background: linear-gradient(180deg, var(--bg) 80%, transparent);
      padding: 10px 12px 0;
    }
    .home-logo {
      display:flex; align-items:center; gap:8px; margin-bottom:10px;
    }
    .home-logo .logo-circle {
      width:32px; height:32px; border-radius:50%; background:var(--accent);
      display:flex; align-items:center; justify-content:center;
      font-weight:bold; font-size:14px;
    }
    .home-logo .logo-text { font-size:18px; font-weight:bold; }
    .home-logo .logo-desc { font-size:11px; color:var(--text-secondary); margin-left:4px; }

    /* Category Tabs */
    .cat-tabs {
      display:flex; overflow-x:auto; gap:16px; padding: 8px 0;
      scrollbar-width:none; -ms-overflow-style:none;
    }
    .cat-tabs::-webkit-scrollbar { display:none; }
    .cat-tab {
      white-space:nowrap; font-size:14px; color:var(--text-secondary);
      cursor:pointer; padding-bottom:6px; border-bottom:2px solid transparent;
      transition: all .2s; flex-shrink:0;
    }
    .cat-tab.active {
      color:var(--text-active); border-bottom-color:var(--accent); font-weight:600;
    }

    /* Video Grid */
    .video-grid {
      display:grid; grid-template-columns: 1fr 1fr;
      gap:8px; padding:8px 12px 16px;
    }
    .video-card {
      background: var(--bg-card); border-radius:8px; overflow:hidden;
      cursor:pointer; transition: transform .15s;
    }
    .video-card:active { transform: scale(0.97); }
    .video-card .cover-box {
      position:relative; width:100%; padding-top:56.25%; overflow:hidden;
      background: #0d1b2a;
    }
    .video-card .cover-box img {
      position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover;
    }
    .video-card .cover-box .badge {
      position:absolute; top:4px; left:4px;
      font-size:10px; padding:1px 5px; border-radius:3px; font-weight:600;
    }
    .badge-vip { background:linear-gradient(135deg,#e94560,#ff6b6b); }
    .badge-coins { background:linear-gradient(135deg,#f0a500,#ffcc00); color:#1a1a2e; }
    .video-card .cover-box .meta-overlay {
      position:absolute; bottom:0; left:0; right:0;
      display:flex; justify-content:space-between; align-items:center;
      padding:3px 6px;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      font-size:10px; color:rgba(255,255,255,0.85);
    }
    .video-card .info-box { padding:6px 8px; }
    .video-card .info-box .title {
      font-size:12px; line-height:1.4;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
      overflow:hidden; word-break:break-all;
    }
    .video-card .info-box .tag-row {
      display:flex; gap:4px; margin-top:4px; flex-wrap:wrap;
    }
    .video-card .info-box .tag {
      font-size:10px; color:var(--accent); background:rgba(233,69,96,0.15);
      padding:1px 5px; border-radius:3px;
    }
    .video-card .info-box .bottom-row {
      display:flex; justify-content:space-between; align-items:center;
      margin-top:4px; font-size:10px; color:var(--text-secondary);
    }

    /* ===== DOUYIN PAGE ===== */
    #page-douyin { position:relative; overflow:hidden; }
    #page-douyin.active { display:flex; flex-direction:column; height:100vh; padding-bottom:0; }
    .dy-container {
      position:relative; width:100%; height:calc(100vh - var(--tab-height) - var(--safe-bottom));
      overflow:hidden; background:#000;
    }
    /* Floating header tabs */
    .dy-top-bar {
      position:absolute; top:0; left:0; right:0; z-index:20;
      display:flex; justify-content:center; align-items:center; gap:24px;
      padding:14px 0 10px;
      background: linear-gradient(rgba(0,0,0,0.6), transparent);
    }
    .dy-top-tab {
      font-size:16px; color:rgba(255,255,255,0.5); cursor:pointer;
      padding-bottom:4px; border-bottom:2px solid transparent;
      transition: all .25s; font-weight:500; position:relative;
    }
    .dy-top-tab.active {
      color:#fff; font-weight:700; font-size:17px;
    }
    .dy-top-tab.active::after {
      content:''; position:absolute; bottom:-2px; left:50%; transform:translateX(-50%);
      width:20px; height:2px; background:#fff; border-radius:1px;
    }

    /* Swipe viewport */
    .dy-swipe-viewport {
      position:relative; width:100%; height:100%;
      touch-action: pan-x; /* allow vertical handled by JS */
    }
    .dy-slide {
      position:absolute; top:0; left:0; width:100%; height:100%;
      will-change: transform; transition: transform .35s cubic-bezier(.25,.46,.45,.94);
      background:#000; overflow:hidden;
    }
    .dy-slide.no-transition { transition:none; }
    .dy-slide .sv-cover {
      width:100%; height:100%; object-fit:cover;
      user-select:none; -webkit-user-drag:none; pointer-events:none;
    }
    /* Bottom info overlay */
    .dy-slide .sv-overlay {
      position:absolute; bottom:0; left:0; right:60px;
      padding:16px 12px calc(16px + var(--safe-bottom));
      background: linear-gradient(transparent 0%, rgba(0,0,0,0.7) 100%);
      pointer-events:none;
    }
    .dy-slide .sv-publisher {
      display:flex; align-items:center; gap:8px; margin-bottom:8px;
      pointer-events:auto;
    }
    .dy-slide .sv-avatar {
      width:40px; height:40px; border-radius:50%; object-fit:cover;
      border:2px solid rgba(255,255,255,0.5); flex-shrink:0;
    }
    .dy-slide .sv-name { font-size:15px; font-weight:700; text-shadow:0 1px 3px rgba(0,0,0,0.5); }
    .dy-slide .sv-follow-btn {
      background:var(--accent); color:#fff; border:none; border-radius:4px;
      font-size:12px; padding:3px 10px; cursor:pointer; font-weight:600;
    }
    .dy-slide .sv-title {
      font-size:14px; line-height:1.5; text-shadow:0 1px 3px rgba(0,0,0,0.5);
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }
    .dy-slide .sv-tags {
      display:flex; gap:6px; margin-top:6px; flex-wrap:wrap;
    }
    .dy-slide .sv-tag {
      font-size:12px; color:rgba(255,255,255,0.8); cursor:pointer;
    }
    .dy-slide .sv-tag::before { content:'#'; }
    /* Music bar */
    .dy-slide .sv-music {
      display:flex; align-items:center; gap:6px; margin-top:8px;
      font-size:12px; color:rgba(255,255,255,0.7);
      overflow:hidden; white-space:nowrap;
    }
    .sv-music-icon { flex-shrink:0; }
    .sv-music-text {
      display:inline-block; animation: marquee 8s linear infinite;
    }
    @keyframes marquee {
      0% { transform:translateX(0); }
      100% { transform:translateX(-50%); }
    }

    /* Right-side action buttons */
    .dy-slide .sv-actions {
      position:absolute; right:8px; bottom:calc(100px + var(--safe-bottom));
      display:flex; flex-direction:column; align-items:center; gap:18px;
      z-index:5;
    }
    .sv-action-btn {
      display:flex; flex-direction:column; align-items:center; gap:3px;
      font-size:11px; color:#fff; cursor:pointer;
      text-shadow:0 1px 3px rgba(0,0,0,0.5);
    }
    .sv-action-btn svg { width:30px; height:30px; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.4)); }
    .sv-action-btn.liked svg { fill:var(--accent); stroke:var(--accent); }

    /* Avatar in actions column */
    .sv-actions .sv-action-avatar {
      position:relative; margin-bottom:6px;
    }
    .sv-action-avatar img {
      width:44px; height:44px; border-radius:50%; object-fit:cover;
      border:2px solid #fff;
    }
    .sv-action-avatar .plus-badge {
      position:absolute; bottom:-6px; left:50%; transform:translateX(-50%);
      width:18px; height:18px; background:var(--accent); border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:14px; font-weight:bold; line-height:1;
    }
    /* Spinning disc */
    .sv-disc {
      width:40px; height:40px; border-radius:50%;
      background: radial-gradient(circle at center, #333 30%, #111 32%, #222 60%, #111 62%);
      border:2px solid #444;
      animation: spin 3s linear infinite;
      margin-top:4px;
    }
    @keyframes spin { 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }

    /* Play icon center */
    .dy-slide .sv-play-center {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(0);
      width:70px; height:70px; background:rgba(255,255,255,0.15); border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      transition: transform .2s ease-out; pointer-events:none;
    }
    .dy-slide .sv-play-center.show { transform:translate(-50%,-50%) scale(1); }
    .dy-slide .sv-play-center svg { width:32px; height:32px; fill:#fff; }

    /* Progress bar */
    .dy-progress-bar {
      position:absolute; bottom:0; left:0; right:0; height:2px;
      background:rgba(255,255,255,0.15); z-index:15;
    }
    .dy-progress-fill {
      height:100%; background:#fff; width:0;
      animation: fakeProgress 15s linear infinite;
    }
    @keyframes fakeProgress { 0%{width:0} 100%{width:100%} }

    /* Swipe hint */
    .dy-swipe-hint {
      position:absolute; bottom:calc(60px + var(--safe-bottom)); left:50%; transform:translateX(-50%);
      color:rgba(255,255,255,0.4); font-size:12px;
      animation: hintBounce 2s ease-in-out infinite;
      pointer-events:none; z-index:10;
    }
    @keyframes hintBounce {
      0%,100% { transform:translateX(-50%) translateY(0); opacity:0.4; }
      50% { transform:translateX(-50%) translateY(-8px); opacity:0.8; }
    }
    .dy-swipe-hint.hidden { display:none; }

    /* ===== MINE PAGE ===== */
    .mine-page { background:var(--bg); }
    .mine-header {
      padding:20px 16px; display:flex; align-items:center; gap:12px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }
    .mine-avatar {
      width:56px; height:56px; border-radius:50%;
      background:var(--accent); display:flex; align-items:center; justify-content:center;
      font-size:24px; flex-shrink:0;
    }
    .mine-info { flex:1; }
    .mine-name { font-size:16px; font-weight:600; }
    .mine-uid { font-size:12px; color:var(--text-secondary); margin-top:2px; }
    .mine-vip-banner {
      margin:12px; padding:12px 16px; border-radius:10px;
      background: linear-gradient(135deg, #2d1b4e 0%, #1a0a2e 100%);
      border:1px solid rgba(233,69,96,0.3);
      display:flex; align-items:center; justify-content:space-between;
    }
    .mine-vip-left { display:flex; flex-direction:column; gap:4px; }
    .mine-vip-title { font-size:14px; font-weight:600; color:var(--accent-gold); }
    .mine-vip-desc { font-size:11px; color:var(--text-secondary); }
    .mine-vip-btn {
      background: linear-gradient(135deg, var(--accent), #ff6b6b);
      color:#fff; border:none; padding:6px 16px; border-radius:20px;
      font-size:12px; font-weight:600; cursor:pointer;
    }

    .mine-stats {
      display:flex; justify-content:space-around; padding:16px 12px;
      border-bottom:1px solid rgba(255,255,255,0.06);
    }
    .mine-stat { text-align:center; }
    .mine-stat .num { font-size:18px; font-weight:600; }
    .mine-stat .label { font-size:11px; color:var(--text-secondary); margin-top:2px; }

    .mine-menu { padding:8px 0; }
    .mine-menu-item {
      display:flex; align-items:center; gap:12px;
      padding:14px 16px; cursor:pointer;
      transition: background .15s;
    }
    .mine-menu-item:active { background:rgba(255,255,255,0.05); }
    .mine-menu-item svg { width:20px; height:20px; color:var(--text-secondary); flex-shrink:0; }
    .mine-menu-item .menu-text { flex:1; font-size:14px; }
    .mine-menu-item .menu-arrow { color:var(--text-secondary); font-size:14px; }

    .mine-section-title {
      padding:12px 16px 8px; font-size:13px; color:var(--text-secondary);
      border-top:6px solid rgba(0,0,0,0.3);
    }

    /* ===== VIDEO DETAIL PAGE ===== */
    .detail-page {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:var(--bg); z-index:200;
      display:none; flex-direction:column;
    }
    .detail-page.open { display:flex; }
    .detail-back {
      position:absolute; top:10px; left:10px; z-index:10;
      width:32px; height:32px; background:rgba(0,0,0,0.5); border-radius:50%;
      display:flex; align-items:center; justify-content:center; cursor:pointer;
    }
    .detail-back svg { width:18px; height:18px; fill:#fff; }
    .detail-video-area {
      width:100%; background:#000; position:relative;
    }
    .detail-video-area img {
      width:100%; aspect-ratio:16/9; object-fit:cover;
    }
    .detail-video-area .play-btn {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      width:54px; height:54px; background:rgba(0,0,0,0.6); border-radius:50%;
      display:flex; align-items:center; justify-content:center; cursor:pointer;
    }
    .detail-video-area .play-btn svg { width:24px; height:24px; fill:#fff; }

    .detail-content {
      flex:1; overflow-y:auto; padding-bottom:20px;
    }
    .detail-tabs {
      display:flex; gap:20px; padding:10px 16px;
      border-bottom:1px solid rgba(255,255,255,0.08);
      position:sticky; top:0; background:var(--bg); z-index:5;
    }
    .detail-tab {
      font-size:14px; color:var(--text-secondary); cursor:pointer; padding-bottom:6px;
    }
    .detail-tab.active { color:var(--text-active); border-bottom:2px solid var(--accent); font-weight:600; }

    .detail-intro { padding:12px 16px; }
    .detail-title { font-size:15px; font-weight:600; line-height:1.5; }
    .detail-tags { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
    .detail-tags .tag {
      font-size:11px; color:var(--accent); background:rgba(233,69,96,0.15);
      padding:2px 8px; border-radius:4px; cursor:pointer;
    }
    .detail-actions {
      display:flex; justify-content:space-between; align-items:center;
      padding:8px 16px; margin-top:8px;
    }
    .detail-actions .left { font-size:12px; color:var(--text-secondary); }
    .detail-actions .right { display:flex; gap:16px; }
    .detail-action-item {
      display:flex; align-items:center; gap:4px;
      font-size:12px; color:var(--text-secondary); cursor:pointer;
    }
    .detail-action-item svg { width:18px; height:18px; }

    .detail-recommend { padding:12px; }
    .detail-recommend .section-title {
      font-size:14px; font-weight:600; margin-bottom:10px;
    }

    /* Loading placeholder */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, rgba(255,255,255,0.06) 50%, var(--bg-card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>

const catNames = Object.keys(DATA.categories);
let currentCat = catNames[0];
let allVideos = [];
Object.values(DATA.categories).forEach(arr => allVideos.push(...arr));
allVideos.push(...DATA.shortVideos);

// Helpers
function formatCount(n) {
  if (n >= 10000) return (n / 10000).toFixed(1) + '万';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return n;
}
function formatTime(sec) {
  if (!sec || sec <= 0) return '00:00';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function coverUrl(path) {
  if (!path) return '';
  return `${BASE_URL}/${path}`;
}

// ===== Tab switching =====
function switchTab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.tab-item')[['home','douyin','mine'].indexOf(name)].classList.add('active');
}

// ===== Home Page =====
function renderCatTabs() {
  const el = document.getElementById('catTabs');
  el.innerHTML = catNames.map(name =>
    `<div class="cat-tab${name===currentCat?' active':''}" onclick="switchCat('${name}')">${name.replace('_',' ')}</div>`
  ).join('');
}

function switchCat(name) {
  currentCat = name;
  renderCatTabs();
  renderHomeGrid();
}

function renderVideoCard(v) {
  const badge = v.freeArea ? '' :
    (v.originCoins === 0 ? '<div class="badge badge-vip">VIP</div>' :
    `<div class="badge badge-coins">金币</div>`);
  const tags = (v.tags || []).filter(t=>t).slice(0,2).map(t => `<span class="tag">${t}</span>`).join('');
  return `<div class="video-card" onclick="openDetail('${v.id}')">
    <div class="cover-box">
      <img src="${coverUrl(v.cover)}" alt="" loading="lazy" onerror="this.style.display='none'">
      ${badge}
      <div class="meta-overlay">
        <span>▶ ${formatCount(v.playCount)}</span>
        <span>${formatTime(v.playTime)}</span>
      </div>
    </div>
    <div class="info-box">
      <div class="title">${v.title}</div>
      <div class="tag-row">${tags}</div>
      <div class="bottom-row">
        <span>${v.publisher?.name || ''}</span>
        <span>${v.commentCount > 0 ? '评论'+formatCount(v.commentCount) : ''}</span>
      </div>
    </div>
  </div>`;
}

function renderHomeGrid() {
  const videos = DATA.categories[currentCat] || [];
  document.getElementById('homeGrid').innerHTML = videos.map(renderVideoCard).join('');
}

// ===== Douyin Page — TikTok-style vertical swipe =====
const dy = {
  tab: 'recommend',       // 'recommend' | 'latest'
  feeds: { recommend: [], latest: [] },
  idx: 0,                 // current index in active feed
  startY: 0,
  startTime: 0,
  deltaY: 0,
  swiping: false,
  threshold: 60,          // px to trigger slide change
  velocityThreshold: 0.4, // px/ms
  hintShown: false,
  likedSet: new Set(),
};

function initDyFeeds() {
  // 推荐: shuffled short videos
  dy.feeds.recommend = [...DATA.shortVideos].sort(() => Math.random() - 0.5);
  // 最新: sorted by playCount descending (simulate "latest popular")
  dy.feeds.latest = [...DATA.shortVideos].sort((a,b) => b.playCount - a.playCount);
}

function dyFeed() { return dy.feeds[dy.tab]; }

function switchDyTab(tab) {
  if (tab === dy.tab) return;
  dy.tab = tab;
  dy.idx = 0;
  document.querySelectorAll('.dy-top-tab').forEach(el => {
    el.classList.toggle('active', el.dataset.dyTab === tab);
  });
  dyRender();
}

        <span class="sv-music-text">${v.publisher?.name||'原声'} 创作的原声 — ${v.title.slice(0,20)}  ·  ${v.publisher?.name||'原声'} 创作的原声 — ${v.title.slice(0,20)}</span>
      </div>
    </div>

    <div class="sv-actions">
      <div class="sv-action-avatar">
        ${avatar ? `<img src="${avatar}" onerror="this.style.display='none'">` : `<img src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'/>">`}
        <div class="plus-badge">+</div>
      </div>
      <div class="sv-action-btn ${liked?'liked':''}" onclick="dyToggleLike(event,'${v.id}')">
        <svg viewBox="0 0 24 24" fill="${liked?'var(--accent)':'none'}" stroke="${liked?'var(--accent)':'currentColor'}" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>

      </div>
      <div class="sv-action-btn" onclick="event.stopPropagation()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span>${formatCount(v.commentCount)}</span>
      </div>
      <div class="sv-action-btn" onclick="event.stopPropagation()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
        <span>分享</span>
      </div>
      <div class="sv-action-btn" onclick="event.stopPropagation()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
        <span>${formatCount(v.collectCount)}</span>
      </div>
      <div class="sv-disc"></div>
    </div>
  </div>`;
}

function dyRender() {
  const vp = document.getElementById('dyViewport');
  const feed = dyFeed();
  const cur = feed[dy.idx];
  const prev = dy.idx > 0 ? feed[dy.idx - 1] : null;
  const next = dy.idx < feed.length - 1 ? feed[dy.idx + 1] : null;

  let html = '';
  if (prev) html += dySlideHTML(prev, 'prev');
  html += dySlideHTML(cur, 'current');
  if (next) html += dySlideHTML(next, 'next');
  vp.innerHTML = html;

  // Position slides
  const slides = vp.querySelectorAll('.dy-slide');
  slides.forEach(s => {
    if (s.dataset.pos === 'prev')    s.style.transform = 'translateY(-100%)';
    else if (s.dataset.pos === 'current') s.style.transform = 'translateY(0)';
    else if (s.dataset.pos === 'next')    s.style.transform = 'translateY(100%)';
  });

  // Reset progress
  const prog = document.getElementById('dyProgress');
  prog.style.animation = 'none';
  prog.offsetHeight; // reflow
  prog.style.animation = 'fakeProgress 15s linear infinite';

  // Hide hint after first swipe
  if (dy.hintShown) {
    document.getElementById('dyHint').classList.add('hidden');
  }
}

function dyToggleLike(e, vid) {
  e.stopPropagation();
  if (dy.likedSet.has(vid)) dy.likedSet.delete(vid);
  else dy.likedSet.add(vid);
  dyRender();
}

// Touch handling
function dyTouchStart(e) {
  dy.startY = e.touches[0].clientY;
  dy.startTime = Date.now();
  dy.deltaY = 0;
  dy.swiping = true;
  // Remove transition during drag
  document.querySelectorAll('.dy-slide').forEach(s => s.classList.add('no-transition'));
}

function dyTouchMove(e) {
  if (!dy.swiping) return;
  dy.deltaY = e.touches[0].clientY - dy.startY;

  // Rubber-band at edges
  const feed = dyFeed();
  if (dy.idx === 0 && dy.deltaY > 0) dy.deltaY *= 0.3;
  if (dy.idx === feed.length - 1 && dy.deltaY < 0) dy.deltaY *= 0.3;

  const slides = document.querySelectorAll('.dy-slide');
  slides.forEach(s => {
    let base = 0;
    if (s.dataset.pos === 'prev') base = -window.innerHeight;
    else if (s.dataset.pos === 'next') base = window.innerHeight;
    s.style.transform = `translateY(${base + dy.deltaY}px)`;
  });
}

function dyTouchEnd(e) {
  if (!dy.swiping) return;
  dy.swiping = false;
  const elapsed = Date.now() - dy.startTime;
  const velocity = Math.abs(dy.deltaY) / elapsed;
  const feed = dyFeed();

  // Re-enable transition
  document.querySelectorAll('.dy-slide').forEach(s => s.classList.remove('no-transition'));

  let dir = 0; // -1 = swipe up (next), 1 = swipe down (prev)
  if (Math.abs(dy.deltaY) > dy.threshold || velocity > dy.velocityThreshold) {
    dir = dy.deltaY < 0 ? -1 : 1;
  }

  if (dir === -1 && dy.idx < feed.length - 1) {
    dy.idx++;
    dy.hintShown = true;
    dyRender();
  } else if (dir === 1 && dy.idx > 0) {
    dy.idx--;
    dyRender();
  } else {
    // Snap back
    const slides = document.querySelectorAll('.dy-slide');
    slides.forEach(s => {
      if (s.dataset.pos === 'prev')    s.style.transform = 'translateY(-100%)';
      else if (s.dataset.pos === 'current') s.style.transform = 'translateY(0)';
      else if (s.dataset.pos === 'next')    s.style.transform = 'translateY(100%)';
    });
  }
}

// Double-tap to like
let lastTapTime = 0;
function dyDoubleTap(e) {
  const now = Date.now();
  if (now - lastTapTime < 300) {
    // Double tap — like
    const cur = dyFeed()[dy.idx];
    if (cur && !dy.likedSet.has(cur.id)) {
      dy.likedSet.add(cur.id);
      dyRender();
      // Show heart animation
      showHeartAnim(e);
    }
  }
  lastTapTime = now;
}

function showHeartAnim(e) {
  const vp = document.getElementById('dyViewport');
  const heart = document.createElement('div');
  heart.innerHTML = `<svg width="80" height="80" viewBox="0 0 24 24" fill="var(--accent)" stroke="none">
    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
  </svg>`;
  heart.style.cssText = `position:absolute;top:${e.touches?e.touches[0].clientY-40:e.clientY-40}px;left:${e.touches?e.touches[0].clientX-40:e.clientX-40}px;z-index:30;pointer-events:none;animation:heartPop .8s ease-out forwards;`;
  vp.appendChild(heart);
  setTimeout(() => heart.remove(), 900);
}

// Add heart animation keyframes
(function(){
  const style = document.createElement('style');
  style.textContent = `@keyframes heartPop { 0%{transform:scale(0);opacity:1} 50%{transform:scale(1.3);opacity:1} 100%{transform:scale(1);opacity:0} }`;
  document.head.appendChild(style);
})();

function initDySwipe() {
  const vp = document.getElementById('dyViewport');
  vp.addEventListener('touchstart', dyTouchStart, {passive:true});
  vp.addEventListener('touchmove', dyTouchMove, {passive:true});
  vp.addEventListener('touchend', dyTouchEnd, {passive:true});
  vp.addEventListener('click', dyDoubleTap);

  // Mouse fallback for desktop
  let mouseDown = false;
  vp.addEventListener('mousedown', e => {
    mouseDown = true;
    dy.startY = e.clientY; dy.startTime = Date.now(); dy.deltaY = 0; dy.swiping = true;
    document.querySelectorAll('.dy-slide').forEach(s => s.classList.add('no-transition'));
  });
  vp.addEventListener('mousemove', e => {
    if (!mouseDown) return;
    dy.deltaY = e.clientY - dy.startY;
    const feed = dyFeed();
    if (dy.idx === 0 && dy.deltaY > 0) dy.deltaY *= 0.3;
    if (dy.idx === feed.length - 1 && dy.deltaY < 0) dy.deltaY *= 0.3;
    document.querySelectorAll('.dy-slide').forEach(s => {
      let base = 0;
      if (s.dataset.pos === 'prev') base = -window.innerHeight;
      else if (s.dataset.pos === 'next') base = window.innerHeight;
      s.style.transform = `translateY(${base + dy.deltaY}px)`;
    });
  });
  vp.addEventListener('mouseup', () => { mouseDown = false; dyTouchEnd(); });
  vp.addEventListener('mouseleave', () => { if(mouseDown){mouseDown=false;dyTouchEnd();} });

  // Keyboard: arrow up/down
  document.addEventListener('keydown', e => {
    if (!document.getElementById('page-douyin').classList.contains('active')) return;
    if (e.key === 'ArrowDown' || e.key === 'j') {
      if (dy.idx < dyFeed().length - 1) { dy.idx++; dy.hintShown=true; dyRender(); }
    } else if (e.key === 'ArrowUp' || e.key === 'k') {
      if (dy.idx > 0) { dy.idx--; dyRender(); }
    }
  });
}

function renderDouyinFeed() {
  initDyFeeds();
  dyRender();
  initDySwipe();
}

// ===== Video Detail =====
function openDetail(id) {
  const v = allVideos.find(v => v.id === id);
  if (!v) return;
  document.getElementById('detailCover').src = coverUrl(v.cover);
  document.getElementById('detailTitle').textContent = v.title;
  document.getElementById('detailPlayCount').textContent = formatCount(v.playCount) + '观看量';
  document.getElementById('detailLike').querySelector('span').textContent = formatCount(v.likeCount);
  document.getElementById('detailCollect').querySelector('span').textContent = formatCount(v.collectCount);

  const tagsEl = document.getElementById('detailTags');
  tagsEl.innerHTML = (v.tags || []).filter(t=>t).map(t => `<span class="tag">${t}</span>`).join('');

  // Recommend: random 4 from same category or all
  const catVideos = allVideos.filter(x => x.id !== id);
  const shuffled = catVideos.sort(() => Math.random() - 0.5).slice(0, 4);
  document.getElementById('detailRecommend').innerHTML = shuffled.map(renderVideoCard).join('');

  document.getElementById('detailPage').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detailPage').classList.remove('open');
  document.body.style.overflow = '';
}

// Init
renderCatTabs();
renderHomeGrid();
renderDouyinFeed();
</script>
